# Streamlit 配置 - Docker/无头模式稳定运行，避免首次运行交互导致容器退出
# https://docs.streamlit.io/develop/api-reference/configuration

[server]
headless = true
address = "0.0.0.0"
port = 8501
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 200

[browser]
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

[runner]
fastReruns = true
