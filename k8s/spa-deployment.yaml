apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-rag-spa
  labels:
    app: enterprise-rag-spa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: enterprise-rag-spa
  template:
    metadata:
      labels:
        app: enterprise-rag-spa
    spec:
      containers:
      - name: spa
        image: enterprise-rag-spa:latest
        ports:
        - containerPort: 80
        env:
        - name: VITE_API_BASE_URL
          value: "http://enterprise-rag-backend-service/api"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: enterprise-rag-spa
spec:
  selector:
    app: enterprise-rag-spa
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: enterprise-rag-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - your-domain.com
    secretName: enterprise-rag-tls
  rules:
  - host: your-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: enterprise-rag-spa
            port:
              number: 80
