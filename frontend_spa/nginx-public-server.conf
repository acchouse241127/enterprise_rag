# 公网服务器（VPS）上的 Nginx 配置
# 用于配合 SSH 反向隧道，将外网请求转发到本机 SPA 前端
#
# 用法：
# 1. 将此文件复制到 VPS，例如 /etc/nginx/conf.d/enterprise_rag_spa.conf
# 2. 在运行 SPA 的本机建立反向隧道：ssh -R 10080:localhost:3000 user@你的VPS
# 3. 重载 Nginx：sudo nginx -t && sudo systemctl reload nginx
#
# 变量说明：
# - 10080：隧道在 VPS 上监听的端口（与 ssh -R 10080:... 一致）
# - 将 your-domain.com 改为你的域名或使用 _ 表示默认 server

server {
    listen 80;
    server_name your-domain.com;   # 改为你的域名，或 _ 表示默认

    client_max_body_size 200M;

    # 全部流量转发到 SSH 隧道端口（本机 SPA 的 Nginx 已处理 /api、/health、静态资源）
    location / {
        proxy_pass http://127.0.0.1:10080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_connect_timeout 60s;
        proxy_send_timeout 86400;
    }
}
