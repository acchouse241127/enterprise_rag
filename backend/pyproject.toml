[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
extend-ignore = []

# E402: import not at top - allow for circular import avoidance and scripts with path setup
[tool.ruff.lint.per-file-ignores]
"app/models/user.py" = ["E402"]
"app/services/knowledge_base_service.py" = ["E402"]
"app/services/qa_service.py" = ["E402"]
"scripts/create_test_users.py" = ["E402"]
