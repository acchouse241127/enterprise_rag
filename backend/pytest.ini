# Enterprise RAG System - Pytest Configuration
# Author: C2
# Date: 2026-02-13
#
# 测试策略：
# - 默认运行：单元测试（无外部依赖）
# - 集成测试：需要 -m integration 或 --run-integration
# - 全量测试：CI 环境或 Docker 全栈回归

[pytest]
# 测试目录
testpaths = tests

# Python 文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 默认参数
addopts = 
    -v
    --tb=short
    --strict-markers

# 自定义 markers
markers =
    integration: 集成测试，需要外部服务（Postgres/Chroma）
    slow: 慢速测试，可能需要较长时间
    llm: 需要 LLM API 的测试

# 忽略警告（含 pytest-asyncio 未安装时的 asyncio_mode 未知选项）
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestConfigWarning

# 日志配置
log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 超时设置（需要 pytest-timeout 插件）
# timeout = 60
